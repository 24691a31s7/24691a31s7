name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --output-format=github || true   # non-blocking for now

      - name: Run tests
        run: pytest -v

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t stocks-backend:ci ./backend

      - name: Build worker image
        run: docker build -t stocks-worker:ci -f ./backend/Dockerfile.worker ./backend

  # Deploy is left as a manual/environment-specific step - fill in your
  # target (GCP Cloud Run, ECS, a VM, etc.) once you've chosen one. A
  # generic health-check gate is included as a placeholder.
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Placeholder deploy step
        run: echo "Wire this up to your actual deployment target (Cloud Run / ECS / VM)."
